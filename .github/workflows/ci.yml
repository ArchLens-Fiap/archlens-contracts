name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: "9.0.x"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ArchLens.Contracts.sln

      - name: Build
        run: dotnet build ArchLens.Contracts.sln --no-restore --configuration Release

  sonar:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: [build]
    if: always()
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - name: Check SONAR_TOKEN
        id: check-token
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.check-token.outputs.skip != 'true'
        with:
          fetch-depth: 0

      - name: Setup .NET
        if: steps.check-token.outputs.skip != 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Java 17
        if: steps.check-token.outputs.skip != 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install SonarScanner
        if: steps.check-token.outputs.skip != 'true'
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Restore
        if: steps.check-token.outputs.skip != 'true'
        run: dotnet restore ArchLens.Contracts.sln

      - name: SonarCloud Begin
        if: steps.check-token.outputs.skip != 'true'
        run: |
          dotnet sonarscanner begin \
            /k:"ArchLens-Fiap_archlens-contracts" \
            /o:"archlens-fiap" \
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}" \
            /d:sonar.host.url="https://sonarcloud.io"

      - name: Build
        if: steps.check-token.outputs.skip != 'true'
        run: dotnet build ArchLens.Contracts.sln --no-restore --configuration Release

      - name: SonarCloud End
        if: steps.check-token.outputs.skip != 'true'
        run: dotnet sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
